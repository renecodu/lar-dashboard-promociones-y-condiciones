<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matriz Comercial LAR - Dashboard Interactivo</title>
<style>
  /* === PALETA CORPORATIVA LAR GROUP ===
     Verde petróleo (primario): #08424D
     Turquesa / aqua (acento):  #62ABBC
     Turquesa claro:            #91CCD0
     Negro:                     #000000
     Variantes derivadas para UI dark mode coherente */
  :root {
    --lar-primary:       #08424D;
    --lar-primary-light: #0E5C6B;
    --lar-primary-dark:  #052E36;
    --lar-accent:        #62ABBC;
    --lar-accent-light:  #91CCD0;
    --lar-accent-dark:   #3D8A9D;
    --lar-bg:            #051F25;
    --lar-bg-2:          #0A2D34;
    --lar-card:          #0E3D47;
    --lar-card-soft:     rgba(14, 61, 71, 0.6);
    --lar-text:          #E8F4F6;
    --lar-text-soft:     #A5C4CA;
    --lar-text-muted:    #6E8E94;
  }
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, var(--lar-bg) 0%, var(--lar-bg-2) 100%);
    color: var(--lar-text); min-height: 100vh; padding: 20px;
  }
  .container { max-width: 1400px; margin: 0 auto; }
  header {
    text-align: center; margin-bottom: 30px; padding: 30px 20px;
    background: linear-gradient(135deg, var(--lar-primary) 0%, var(--lar-primary-light) 100%);
    border-radius: 16px; border: 1px solid var(--lar-accent-dark);
    box-shadow: 0 10px 30px rgba(8, 66, 77, 0.4);
  }
  h1 {
    font-size: 2.2rem;
    background: linear-gradient(90deg, #FFFFFF, var(--lar-accent-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px; letter-spacing: 0.5px;
  }
  .subtitle { color: var(--lar-accent-light); font-size: 1rem; }
  
  .project-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 10px; margin-bottom: 25px;
  }
  .project-btn {
    padding: 14px 8px; background: var(--lar-card-soft);
    border: 2px solid rgba(98, 171, 188, 0.25); border-radius: 12px;
    color: var(--lar-text-soft); font-weight: 600; cursor: pointer;
    transition: all 0.25s ease; font-size: 0.9rem; text-align: center; position: relative;
  }
  .project-btn:hover {
    border-color: var(--lar-accent);
    background: rgba(98, 171, 188, 0.12);
    transform: translateY(-2px);
  }
  .project-btn.active {
    background: linear-gradient(135deg, var(--lar-primary), var(--lar-accent-dark));
    border-color: var(--lar-accent); color: white;
    box-shadow: 0 8px 20px rgba(98, 171, 188, 0.35);
  }
  .project-btn.collective { border-color: var(--lar-accent-light); }
  .project-btn.collective.active {
    background: linear-gradient(135deg, var(--lar-accent), var(--lar-accent-light));
    color: var(--lar-primary-dark);
    box-shadow: 0 8px 20px rgba(145, 204, 208, 0.4);
  }
  .badge-new {
    position: absolute; top: -6px; right: -6px;
    background: var(--lar-accent); color: var(--lar-primary-dark); font-size: 0.6rem;
    padding: 2px 6px; border-radius: 10px; font-weight: 700;
  }
  
  .controls {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-bottom: 20px; justify-content: space-between; align-items: center;
  }
  .mode-toggle {
    display: flex; gap: 8px; background: var(--lar-card-soft);
    padding: 6px; border-radius: 10px; flex-wrap: wrap;
    border: 1px solid rgba(98, 171, 188, 0.15);
  }
  .mode-btn {
    padding: 8px 16px; background: transparent; border: none;
    color: var(--lar-text-soft); border-radius: 8px; cursor: pointer;
    font-weight: 500; transition: all 0.2s;
  }
  .mode-btn.active {
    background: var(--lar-accent); color: var(--lar-primary-dark); font-weight: 600;
  }
  .search-box {
    flex: 1; min-width: 200px; padding: 10px 16px;
    background: var(--lar-card-soft);
    border: 1px solid rgba(98, 171, 188, 0.25);
    border-radius: 10px; color: var(--lar-text); font-size: 0.95rem;
  }
  .search-box::placeholder { color: var(--lar-text-muted); }
  .search-box:focus { outline: none; border-color: var(--lar-accent); }
  
  .category-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .cat-tab {
    padding: 8px 16px; background: var(--lar-card-soft);
    border: 1px solid rgba(98, 171, 188, 0.2); border-radius: 20px;
    color: var(--lar-text-soft); cursor: pointer; font-size: 0.85rem;
    font-weight: 500; transition: all 0.2s;
  }
  .cat-tab:hover { background: rgba(98, 171, 188, 0.15); }
  .cat-tab.active {
    background: var(--lar-accent);
    color: var(--lar-primary-dark); border-color: var(--lar-accent); font-weight: 600;
  }
  
  .detail-view {
    background: var(--lar-card-soft); border-radius: 16px;
    border: 1px solid rgba(98, 171, 188, 0.2); padding: 25px; margin-bottom: 20px;
    backdrop-filter: blur(10px);
  }
  .project-header {
    display: flex; align-items: center; gap: 15px; margin-bottom: 20px;
    padding-bottom: 15px; border-bottom: 1px solid rgba(98, 171, 188, 0.2);
  }
  .project-icon {
    width: 50px; height: 50px; border-radius: 12px;
    background: linear-gradient(135deg, var(--lar-primary), var(--lar-accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; font-weight: 700; color: white;
    box-shadow: 0 4px 12px rgba(8, 66, 77, 0.5);
  }
  .project-icon.collective {
    background: linear-gradient(135deg, var(--lar-accent), var(--lar-accent-light));
    color: var(--lar-primary-dark);
  }
  .project-name { font-size: 1.6rem; font-weight: 700; color: white; }
  .project-tag {
    display: inline-block; margin-left: 10px; padding: 3px 10px;
    background: rgba(98, 171, 188, 0.2); color: var(--lar-accent-light);
    border-radius: 10px; font-size: 0.7rem; font-weight: 700; vertical-align: middle;
  }
  
  .info-banner {
    background: linear-gradient(90deg, rgba(98, 171, 188, 0.18), rgba(98, 171, 188, 0.05));
    border-left: 3px solid var(--lar-accent); padding: 12px 16px;
    border-radius: 8px; margin-bottom: 16px; font-size: 0.85rem; color: var(--lar-accent-light);
  }
  
  .section-title {
    font-size: 1.1rem; font-weight: 600; color: var(--lar-accent-light);
    margin: 20px 0 12px 0; padding-bottom: 6px;
    border-bottom: 2px solid rgba(98, 171, 188, 0.3);
    display: flex; align-items: center; gap: 8px;
    justify-content: flex-start; flex-wrap: wrap;
  }
  .section-title:first-child { margin-top: 0; }
  
  .req-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
  .req-item {
    display: grid; grid-template-columns: 220px 1fr; gap: 16px;
    padding: 12px 14px; background: rgba(5, 31, 37, 0.5);
    border-radius: 10px; border-left: 3px solid var(--lar-accent);
  }
  .req-label { font-weight: 600; color: var(--lar-accent-light); font-size: 0.9rem; }
  .req-value { color: var(--lar-text); font-size: 0.9rem; line-height: 1.5; }
  
  .profile-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .profile-tab {
    padding: 10px 16px; background: var(--lar-card-soft);
    border: 1px solid rgba(98, 171, 188, 0.3); border-radius: 10px;
    color: var(--lar-text-soft); cursor: pointer; font-size: 0.85rem;
    font-weight: 500; transition: all 0.2s;
  }
  .profile-tab:hover { background: rgba(98, 171, 188, 0.15); }
  .profile-tab.active {
    background: var(--lar-accent);
    color: var(--lar-primary-dark); border-color: var(--lar-accent); font-weight: 600;
  }
  
  .promo-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 12px;
  }
  .promo-card {
    padding: 14px; border-radius: 12px; border: 2px solid;
    transition: all 0.3s;
  }
  .promo-yes {
    background: linear-gradient(135deg, rgba(98, 171, 188, 0.22), rgba(98, 171, 188, 0.06));
    border-color: var(--lar-accent);
  }
  .promo-no {
    background: rgba(5, 31, 37, 0.6);
    border-color: rgba(110, 142, 148, 0.25); opacity: 0.55;
  }
  .promo-eval {
    background: linear-gradient(135deg, rgba(234, 179, 8, 0.15), rgba(234, 179, 8, 0.05));
    border-color: rgba(234, 179, 8, 0.5);
  }
  .promo-status {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 0.75rem; font-weight: 700; margin-bottom: 8px;
  }
  .status-yes { background: var(--lar-accent); color: var(--lar-primary-dark); }
  .status-no { background: var(--lar-text-muted); color: var(--lar-bg); }
  .status-eval { background: #eab308; color: #1e293b; }
  .promo-text { font-size: 0.88rem; color: var(--lar-text); line-height: 1.4; }
  
  .comparison-wrap {
    overflow-x: auto; background: var(--lar-card-soft);
    border-radius: 16px; border: 1px solid rgba(98, 171, 188, 0.2); padding: 20px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid rgba(98, 171, 188, 0.15); }
  th {
    background: var(--lar-primary); color: var(--lar-accent-light);
    font-weight: 700; position: sticky; top: 0; text-align: center;
    border-bottom: 2px solid var(--lar-accent);
  }
  th.collective-col {
    background: var(--lar-accent-dark); color: white;
  }
  th:first-child { text-align: left; min-width: 180px; }
  td:first-child {
    font-weight: 600; color: var(--lar-text);
    background: rgba(5, 31, 37, 0.5); min-width: 180px;
  }
  td { color: var(--lar-text-soft); vertical-align: top; text-align: center; }
  tr:hover td { background: rgba(98, 171, 188, 0.06); }
  .cell-yes { color: var(--lar-accent-light); font-weight: 700; }
  .cell-no { color: var(--lar-text-muted); }
  .cell-eval { color: #fbbf24; font-weight: 600; font-size: 0.78rem; }
  
  .badge {
    display: inline-block; padding: 3px 8px; border-radius: 4px;
    font-size: 0.75rem; font-weight: 600;
  }
  .badge-yes { background: rgba(98, 171, 188, 0.25); color: var(--lar-accent-light); }
  .badge-no { background: rgba(110, 142, 148, 0.2); color: var(--lar-text-muted); }
  .badge-eval { background: rgba(234, 179, 8, 0.2); color: #fbbf24; }
  
  .hidden { display: none !important; }
  
  .legend {
    display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 15px;
    padding: 12px; background: rgba(5, 31, 37, 0.5);
    border-radius: 10px; font-size: 0.85rem;
    border: 1px solid rgba(98, 171, 188, 0.15);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; color: var(--lar-text-soft); }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
  
  /* Logo monogram en header */
  .lar-logo {
    display: inline-block;
    background: var(--lar-accent);
    color: var(--lar-primary-dark);
    padding: 8px 14px;
    border-radius: 4px;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 2px;
    margin-bottom: 12px;
    box-shadow: 0 4px 12px rgba(98, 171, 188, 0.3);
  }
  .lar-logo small {
    display: block;
    font-size: 0.55rem;
    font-weight: 600;
    letter-spacing: 3px;
    margin-top: -2px;
  }
  
  /* Fila título + fecha */
  .header-title-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .header-title-row h1 { margin-bottom: 0; }
  .today-date {
    background: rgba(98, 171, 188, 0.18);
    border: 1px solid var(--lar-accent);
    color: var(--lar-accent-light);
    padding: 8px 16px;
    border-radius: 24px;
    font-size: 0.85rem;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    backdrop-filter: blur(4px);
  }
  .today-date::before {
    content: '📅';
    font-size: 0.9rem;
  }
  
  @media (max-width: 768px) {
    h1 { font-size: 1.6rem; }
    .req-item { grid-template-columns: 1fr; gap: 4px; }
    .project-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="lar-logo">LAR<small>GROUP</small></div>
    <div class="header-title-row">
      <h1>Matriz Comercial</h1>
      <div class="today-date" id="todayDate"></div>
    </div>
    <p class="subtitle">Requisitos, Condiciones y Promociones · 13 Proyectos</p>
  </header>
  <div class="controls">
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="detail">📋 Vista Detalle</button>
      <button class="mode-btn" data-mode="compare">⚖️ Comparar Todos</button>
      <button class="mode-btn" data-mode="promos">🎁 Promociones</button>
    </div>
    <input type="text" id="search" class="search-box" placeholder="🔍 Buscar requisito o condición...">
  </div>
  <div id="detailMode">
    <div class="project-grid" id="projectGrid"></div>
    <div class="category-tabs" id="categoryTabs">
      <button class="cat-tab active" data-cat="all">Todos</button>
      <button class="cat-tab" data-cat="todos">📄 Documentos Generales</button>
      <button class="cat-tab" data-cat="dependientes">💼 Dependientes</button>
      <button class="cat-tab" data-cat="independientes">🧑‍💻 Independientes</button>
      <button class="cat-tab" data-cat="juridica">🏢 Persona Jurídica</button>
      <button class="cat-tab" data-cat="aval">🛡️ Aval & Garantías</button>
      <button class="cat-tab" data-cat="extras">⚡ Extras</button>
    </div>
    <div class="detail-view" id="detailView"></div>
  </div>
  <div id="compareMode" class="hidden">
    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:#62ABBC"></span>Disponible</div>
      <div class="legend-item"><span class="legend-dot" style="background:#6E8E94"></span>No disponible</div>
      <div class="legend-item"><span class="legend-dot" style="background:#eab308"></span>En evaluación</div>
      <div class="legend-item"><span class="legend-dot" style="background:#91CCD0"></span>Collective (condiciones distintas)</div>
    </div>
    <div class="comparison-wrap"><table id="compareTable"></table></div>
  </div>
  <div id="promosMode" class="hidden">
    <div class="comparison-wrap"><table id="promosTable"></table></div>
  </div>
</div>
<script>
const projects = ['SOHO','PARK','CENTRAL','BOLDO','SPOT','HOLLEY','BELLET','IMU','BROOKLYN','NATIVO','RESIDENCE','URBANA','COLLECTIVE'];

// Fecha de hoy en español, capitalizada
(function setTodayDate() {
  const today = new Date();
  const formatted = today.toLocaleDateString('es-CL', {
    weekday: 'long',
    year: 'numeric',
    month: 'long',
    day: 'numeric'
  });
  // Capitalizar primera letra (es-CL devuelve "lunes, 5 de mayo de 2026")
  const capitalized = formatted.charAt(0).toUpperCase() + formatted.slice(1);
  const el = document.getElementById('todayDate');
  if (el) el.textContent = capitalized;
})();

const requirements = {
  todos: [
    { label: 'Cédula de Identidad', values: { all: 'Fotocopia Cédula Identidad (Tiro / Retiro) con vigencia durante el período del contrato', COLLECTIVE: 'Fotocopia ambos lados' } },
    { label: 'Pasaporte', values: { all: 'Fotocopia Pasaporte con vigencia durante el período de contrato', COLLECTIVE: '—' }, note: 'LAR: solo extranjeros de UE, EEUU, China, Brasil. Otras nacionalidades requieren Visa o CI.' },
    { label: 'Residencia Permanente', values: { all: 'SI', COLLECTIVE: 'SI' } },
    { label: 'Extranjeros con VISA', values: { all: 'Visa permanente, de trabajo, estudios o en trámite (con vigencia al inicio del contrato)', COLLECTIVE: '—' } },
    { label: 'Extranjeros con RUT provisorio', values: {
      SOHO: 'No', BOLDO: 'No', NATIVO: 'No', RESIDENCE: 'No', URBANA: 'No',
      PARK: 'Con contrato de trabajo, certificado estudios, pagando 12 meses adelantado o 3 meses de garantía (sin aval)',
      CENTRAL: 'Con contrato de trabajo, certificado estudios, pagando 12 meses adelantado o 3 meses de garantía (sin aval)',
      SPOT: 'Con contrato de trabajo, certificado estudios, pagando 12 meses adelantado o 3 meses de garantía (sin aval)',
      HOLLEY: 'Con contrato de trabajo, certificado estudios, pagando 12 meses adelantado o 3 meses de garantía (sin aval)',
      BELLET: 'Con contrato de trabajo, certificado estudios, pagando 12 meses adelantado o 3 meses de garantía (sin aval)',
      IMU: 'Con contrato de trabajo, certificado estudios, pagando 12 meses adelantado o 3 meses de garantía (sin aval)',
      BROOKLYN: 'Con contrato de trabajo, certificado estudios, pagando 12 meses adelantado o 3 meses de garantía (sin aval)',
      COLLECTIVE: '—'
    } },
    { label: 'Certificado Antecedentes', values: { all: 'SI', COLLECTIVE: 'Sin antecedentes' } },
    { label: 'Informe Dicom (Infocheck)', values: { all: 'Equifax Platinum 360 calificación 999', COLLECTIVE: 'Equifax Platinum 360 Calificación 999' } },
    { label: 'Renta requerida titular (Dep./Indep.)', values: {
      SOHO: '3 rentas líquidas, con Aval', PARK: '3 rentas líquidas, con Aval',
      CENTRAL: '3 rentas líquidas, con Aval', BOLDO: '3 rentas líquidas, con Aval',
      SPOT: '3 rentas líquidas, con Aval', HOLLEY: '3 rentas líquidas, con Aval',
      BELLET: '3 rentas líquidas, con Aval', IMU: '3 rentas líquidas, con Aval',
      BROOKLYN: '3 rentas líquidas, con Aval', NATIVO: '3 rentas líquidas, con Aval',
      RESIDENCE: '3 rentas líquidas, con Aval', URBANA: '3 rentas líquidas, con Aval',
      COLLECTIVE: '2,5 x renta del depto'
    } },
    { label: 'Acreditación Renta (Medida temporal)', values: {
      SOHO: '—', SPOT: '—', BROOKLYN: '—', RESIDENCE: '—', COLLECTIVE: '—',
      PARK: '2,5 rentas líquidas (sin complemento), Sin Aval (medida temporal)',
      CENTRAL: '2,5 rentas líquidas (sin complemento), Sin Aval (medida temporal)',
      HOLLEY: 'NO / EN EVALUACIÓN',
      BELLET: '2,5 rentas líquidas (sin complemento), Con Aval (medida temporal)',
      IMU: '2,5 rentas líquidas (sin complemento), Con Aval (medida temporal)',
      BOLDO: '2,5 rentas líquidas (sin complemento), Con Aval (medida temporal)',
      NATIVO: '2,5 rentas líquidas (sin complemento), Con Aval (medida temporal)',
      URBANA: '2,5 rentas líquidas (sin complemento), Sin Aval (medida temporal)'
    } },
    { label: 'Complemento Renta', values: {
      SOHO: 'Titular 2,5 rentas + complemento total 4,0 veces arriendo, con Aval. Complemento debe ser residente.',
      SPOT: 'Titular 2,5 rentas + complemento total 4,0 veces arriendo, con Aval. Complemento debe ser residente.',
      BOLDO: 'Titular 2,5 rentas + complemento total 4,0 veces arriendo, con Aval. Complemento debe ser residente.',
      BROOKLYN: 'Titular 2,5 rentas + complemento total 4,0 veces arriendo, con Aval. Complemento debe ser residente.',
      RESIDENCE: 'Titular 2,5 rentas + complemento total 4,0 veces arriendo, con Aval. Complemento debe ser residente.',
      PARK: 'Titular 2,0 rentas + complemento total 3,0 veces arriendo, con Aval (medida temporal). Complemento debe ser residente.',
      CENTRAL: 'Titular 2,0 rentas + complemento total 3,0 veces arriendo, con Aval (medida temporal). Complemento debe ser residente.',
      HOLLEY: 'Titular 2,0 rentas + complemento total 3,0 veces arriendo, con Aval (medida temporal). Complemento debe ser residente.',
      BELLET: 'Titular 2,0 rentas + complemento total 3,0 veces arriendo, con Aval (medida temporal). Complemento debe ser residente.',
      IMU: 'Titular 2,0 rentas + complemento total 3,0 veces arriendo, con Aval (medida temporal). Complemento debe ser residente.',
      NATIVO: 'Titular 2,0 rentas + complemento total 3,0 veces arriendo, con Aval (medida temporal). Complemento debe ser residente.',
      URBANA: 'Titular 2,0 rentas + complemento total 3,0 veces arriendo, con Aval (medida temporal). Complemento debe ser residente.',
      COLLECTIVE: 'SI — Titular 2x renta depto + total 3x renta depto'
    } }
  ],
  dependientes: [
    { label: 'Liquidaciones Sueldo (fijo)', values: { all: '3 últimas liquidaciones', COLLECTIVE: '3 últimas' } },
    { label: 'Liquidaciones Sueldo (variable)', values: { all: '6 últimas liquidaciones', COLLECTIVE: '6 últimas' } },
    { label: 'Contrato o Carta Empleador', values: { all: 'Copia de Contrato o Certificado laboral', COLLECTIVE: 'SI' } },
    { label: 'Certificado Cotización AFP', values: { all: 'Últimos 12 meses', COLLECTIVE: 'Últimos 12 meses' } }
  ],
  independientes: [
    { label: 'Carpeta Tributaria / Formularios', values: { all: 'Carpeta Tributaria último año y Formulario F22', COLLECTIVE: 'Último año y formulario 29' } },
    { label: 'Boletas Honorarios', values: { all: '3 últimos meses (6 si variación >50% entre meses)', COLLECTIVE: '—' } },
    { label: 'Pago Provisional Mensual', values: { all: 'SI', COLLECTIVE: '—' } },
    { label: 'Certificado Inicio Actividades', values: { all: 'SI', COLLECTIVE: '—' } },
    { label: 'Declaración Anual SII', values: { all: 'SI', COLLECTIVE: '—' } },
    { label: 'Otros Ingresos', values: { all: 'Pago Adelantado 12 Meses', COLLECTIVE: '—' } }
  ],

  return '—';

function renderDetail() {
  if (currentProject === 'COLLECTIVE') {
    renderCollectiveDetail();
    return;
  }
  
  const view = document.getElementById('detailView');
  const initial = currentProject.charAt(0);
  const displayName = projectDisplayNames[currentProject] || currentProject;
  const subtitle = projectDisplayNames[currentProject] 
    ? `Antes: ${currentProject} · Requisitos y condiciones del proyecto` 
    : 'Requisitos y condiciones del proyecto';
  let html = `
    <div class="project-header">
      <div class="project-icon">${initial}</div>
      <div>
        <div class="project-name">${displayName}</div>
        <div style="color:#94a3b8;font-size:0.9rem">${subtitle}</div>
      </div>
    </div>
  `;
  
  const cats = currentCategory === 'all' ? Object.keys(requirements) : [currentCategory];
  const searchTerm = document.getElementById('search').value.toLowerCase();
  
  // PROMOCIONES PRIMERO (siempre visibles excepto cuando hay un filtro de categoría que las excluye)
  if (currentCategory === 'all' || currentCategory === 'extras') {
    const projectPromos = promotions.filter(p => {
      if (!searchTerm) return true;
      return p.name.toLowerCase().includes(searchTerm);
    });
    if (projectPromos.length > 0) {
      // Contador de promos disponibles
      const availableCount = projectPromos.filter(p => p.values[currentProject] === 'SI').length;
      const evalCount = projectPromos.filter(p => p.values[currentProject] === 'EVAL').length;
      
      html += `
        <h3 class="section-title">
          🎁 Promociones Disponibles 
          <span style="margin-left:auto;font-size:0.8rem;font-weight:500;color:#94a3b8">
            <span style="color:var(--lar-accent-light)">${availableCount} activas</span>
            ${evalCount > 0 ? ` · <span style="color:#fbbf24">${evalCount} en evaluación</span>` : ''}
          </span>
        </h3>
      `;
      
      // Glosa especial del proyecto (ej. Brooklyn: no acumulables)
      if (projectNotes[currentProject]) {
        html += `
          <div style="background:linear-gradient(90deg, rgba(234,179,8,0.15), rgba(234,179,8,0.05));
                      border-left:3px solid #eab308; padding:10px 14px; border-radius:8px;
                      margin-bottom:14px; font-size:0.85rem; color:#fde68a">
            ${projectNotes[currentProject]}
          </div>
        `;
      }
      
      html += '<div class="promo-grid">';
      projectPromos.forEach(promo => {
        const status = promo.values[currentProject];
        const cls = status === 'SI' ? 'promo-yes' : status === 'EVAL' ? 'promo-eval' : 'promo-no';
        const statusCls = status === 'SI' ? 'status-yes' : status === 'EVAL' ? 'status-eval' : 'status-no';
        const statusText = status === 'SI' ? '✓ DISPONIBLE' : status === 'EVAL' ? '⏳ EN EVALUACIÓN' : '✗ NO DISPONIBLE';
        html += `
          <div class="promo-card ${cls}">
            <span class="promo-status ${statusCls}">${statusText}</span>
            <div class="promo-text">${promo.icon} ${promo.name}</div>
          </div>
        `;
      });
      html += '</div>';
    }
  }
  
  // Luego los requisitos por categoría
  cats.forEach(cat => {
    const cfg = categoryConfig[cat];
    const items = requirements[cat].filter(r => {
      if (!searchTerm) return true;
      const val = getValue(r, currentProject).toLowerCase();
      return r.label.toLowerCase().includes(searchTerm) || val.includes(searchTerm);
    });
    if (items.length === 0) return;
    
    html += `<h3 class="section-title">${cfg.icon} ${cfg.title}</h3><div class="req-grid">`;
    items.forEach(req => {
      const val = getValue(req, currentProject);
      if (val === '—') return;
      const isYes = val === 'SI';
      const isNo = val === 'No' || val === 'NO';
      const isEval = val.includes('EVALUACIÓN');
      let displayVal = val;
      if (isYes) displayVal = '<span class="badge badge-yes">✓ SI</span>';
      else if (isNo) displayVal = '<span class="badge badge-no">✗ NO</span>';
      else if (isEval) displayVal = '<span class="badge badge-eval">⏳ EN EVALUACIÓN</span>';
      
      html += `
        <div class="req-item">
          <div class="req-label">${req.label}</div>
          <div class="req-value">${displayVal}${req.note ? `<div style="color:#94a3b8;font-size:0.8rem;margin-top:4px;font-style:italic">ℹ️ ${req.note}</div>` : ''}</div>
        </div>
      `;
    });
    html += '</div>';
  });
  
  view.innerHTML = html;
}

function renderCompare() {
  const table = document.getElementById('compareTable');
  const searchTerm = document.getElementById('search').value.toLowerCase();
  
  let html = '<thead><tr><th>Requisito</th>';
  projects.forEach(p => {
    const cls = p === 'COLLECTIVE' ? 'collective-col' : '';
    const name = projectDisplayNames[p] || p;
    html += `<th class="${cls}">${name}</th>`;
  });
  html += '</tr></thead><tbody>';
  
  Object.keys(requirements).forEach(cat => {
    const cfg = categoryConfig[cat];
    const filtered = requirements[cat].filter(r => {
      if (!searchTerm) return true;
      return r.label.toLowerCase().includes(searchTerm);
    });
    if (filtered.length === 0) return;
    
    html += `<tr><td colspan="${projects.length+1}" style="background:rgba(98,171,188,0.18);color:var(--lar-accent-light);text-align:center;font-weight:700;padding:12px">${cfg.icon} ${cfg.title.toUpperCase()}</td></tr>`;
    
    filtered.forEach(req => {
      html += `<tr><td>${req.label}</td>`;
      projects.forEach(p => {
        const val = getValue(req, p);
        let cellClass = '';
        let display = val;
        if (val === 'SI') { cellClass = 'cell-yes'; display = '✓'; }
        else if (val === 'No' || val === 'NO') { cellClass = 'cell-no'; display = '✗'; }
        else if (val.includes('EVALUACIÓN')) { cellClass = 'cell-eval'; display = '⏳'; }
        else if (val === '—') { display = '<span style="color:#475569">—</span>'; }
        else if (val === 'N/A') { cellClass = 'cell-no'; display = 'N/A'; }
        else display = `<span style="font-size:0.75rem;color:#cbd5e1">${val.length > 60 ? val.substring(0,60)+'...' : val}</span>`;
        html += `<td class="${cellClass}" title="${val.replace(/"/g,'&quot;')}">${display}</td>`;
      });
      html += '</tr>';
    });
  });
  
  html += '</tbody>';
  table.innerHTML = html;
}

function renderPromos() {
  const table = document.getElementById('promosTable');
  const searchTerm = document.getElementById('search').value.toLowerCase();
  
  let html = '<thead><tr><th>Promoción</th>';
  projects.forEach(p => {
    const cls = p === 'COLLECTIVE' ? 'collective-col' : '';
    const name = projectDisplayNames[p] || p;
    html += `<th class="${cls}">${name}</th>`;
  });
  html += '</tr></thead><tbody>';
  
  promotions.filter(p => !searchTerm || p.name.toLowerCase().includes(searchTerm)).forEach(promo => {
    html += `<tr><td>${promo.icon} ${promo.name}</td>`;
    projects.forEach(p => {
      const v = promo.values[p];
      const cls = v === 'SI' ? 'cell-yes' : v === 'EVAL' ? 'cell-eval' : 'cell-no';
      const sym = v === 'SI' ? '✓' : v === 'EVAL' ? '⏳' : '✗';
      const tip = v === 'EVAL' ? 'En Evaluación' : v === 'SI' ? 'Disponible' : 'No Disponible';
      html += `<td class="${cls}" title="${tip}">${sym}</td>`;
    });
    html += '</tr>';
  });
  
  html += `<tr style="background:rgba(98,171,188,0.18)"><td style="font-weight:700;color:var(--lar-accent-light)">📊 Total promos disponibles</td>`;
  projects.forEach(p => {
    const count = promotions.filter(promo => promo.values[p] === 'SI').length;
    html += `<td style="font-weight:700;color:var(--lar-accent-light);font-size:1.1rem">${count}/${promotions.length}</td>`;
  });
  html += '</tr>';
  
  html += '</tbody>';
  table.innerHTML = html;
}

document.getElementById('search').addEventListener('input', () => {
  if (currentMode === 'detail') renderDetail();
  else if (currentMode === 'compare') renderCompare();
  else if (currentMode === 'promos') renderPromos();
});

renderDetail();
</script>
</body>
</html>
